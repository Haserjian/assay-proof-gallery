name: verify-gallery

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  verify:
    name: Verify proof pack contracts
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Assay
        run: pip install assay-ai --quiet

      - name: Check gallery contract (committed artifacts)
        run: python scripts/check_gallery.py --verbose

      - name: Rebuild gallery from source
        run: python scripts/build_gallery.py

      - name: Check gallery contract (freshly rebuilt artifacts)
        run: python scripts/check_gallery.py --verbose

      - name: Assert scenario 02 verify.sh uses --require-claim-pass
        run: |
          if ! grep -q '\-\-require-claim-pass' gallery/02-insurance-honest-fail/verify.sh; then
            echo "ERROR: verify.sh for scenario 02 must use --require-claim-pass"
            exit 1
          fi
          echo "OK: --require-claim-pass present in scenario 02 verify.sh"

      - name: Assert tampered pack returns exit 2
        run: |
          set +e
          assay verify-pack gallery/03-tamper-demo/tampered
          EXIT=$?
          set -e
          if [ "$EXIT" -ne 2 ]; then
            echo "ERROR: tampered pack returned exit $EXIT, expected 2"
            exit 1
          fi
          echo "OK: tampered pack returned exit 2"

      - name: Assert clean pack returns exit 0
        run: |
          assay verify-pack gallery/03-tamper-demo/good
          echo "OK: clean pack returned exit 0"

      - name: Check browser verifier bundle provenance
        run: |
          if [ ! -f docs/VERIFIER_PROVENANCE.json ]; then
            echo "ERROR: docs/VERIFIER_PROVENANCE.json not found"
            exit 1
          fi
          EXPECTED_SHA=$(python3 -c "import json; print(json.load(open('docs/VERIFIER_PROVENANCE.json'))['bundle_sha256'])")
          ACTUAL_SHA=$(sha256sum docs/assay-verify.js | cut -d' ' -f1)
          if [ "$EXPECTED_SHA" != "$ACTUAL_SHA" ]; then
            echo "ERROR: verifier bundle hash mismatch"
            echo "  Expected: $EXPECTED_SHA"
            echo "  Actual:   $ACTUAL_SHA"
            exit 1
          fi
          echo "OK: bundle hash matches provenance ($ACTUAL_SHA)"

      - name: Check browser verifier freshness
        run: |
          SYNCED=$(python3 -c "import json; print(json.load(open('docs/VERIFIER_PROVENANCE.json'))['synced_at'])")
          DAYS_AGO=$(python3 -c "
          from datetime import datetime, timezone
          synced = datetime.fromisoformat('$SYNCED'.replace('Z', '+00:00'))
          now = datetime.now(timezone.utc)
          print((now - synced).days)
          ")
          echo "Bundle synced $DAYS_AGO days ago"
          if [ "$DAYS_AGO" -gt 45 ]; then
            echo "ERROR: verifier bundle is $DAYS_AGO days old (max: 45). Run scripts/sync-verifier.sh"
            exit 1
          elif [ "$DAYS_AGO" -gt 14 ]; then
            echo "WARNING: verifier bundle is $DAYS_AGO days old. Consider running scripts/sync-verifier.sh"
          fi

      - name: Set up Node.js for bundle source-rebuild gate
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify bundle reproduces from pinned source
        run: |
          set -euo pipefail
          PIN=$(python3 -c "import json; print(json.load(open('docs/VERIFIER_PROVENANCE.json'))['source_commit'])")
          SOURCE_REPO=$(python3 -c "import json; print(json.load(open('docs/VERIFIER_PROVENANCE.json'))['source_repo'])")
          echo "Rebuilding ${SOURCE_REPO} at ${PIN}"

          REBUILD_DIR=/tmp/verify-ts-rebuild
          rm -rf "$REBUILD_DIR"
          git clone "https://github.com/${SOURCE_REPO}.git" "$REBUILD_DIR"
          git -C "$REBUILD_DIR" checkout "$PIN"
          (cd "$REBUILD_DIR" && npm ci && npm run build:browser)

          REBUILT_SHA=$(sha256sum "$REBUILD_DIR/browser/assay-verify.js" | cut -d' ' -f1)
          CHECKED_IN_SHA=$(sha256sum docs/assay-verify.js | cut -d' ' -f1)

          if [ "$REBUILT_SHA" != "$CHECKED_IN_SHA" ]; then
            echo "ERROR: bundle does not reproduce from pinned source ${PIN}"
            echo "  Rebuilt:    ${REBUILT_SHA}"
            echo "  Checked in: ${CHECKED_IN_SHA}"
            echo "First differing bytes (cmp -l, max 20 lines):"
            cmp -l "$REBUILD_DIR/browser/assay-verify.js" docs/assay-verify.js | head -20 || true
            echo ""
            echo "If this drift is intentional, run scripts/sync-verifier.sh against a verify-ts"
            echo "checkout at the new commit, commit the updated bundle and provenance, and re-run CI."
            exit 1
          fi
          echo "OK: bundle byte-reproduces from pinned source ${PIN}"
          echo "  sha256: ${REBUILT_SHA}"

      - name: Assert no inline verifyPack function remains
        run: |
          if grep -q 'function verifyPack' docs/verify.html; then
            echo "ERROR: inline verifyPack function found in verify.html"
            echo "The browser verifier must use the canonical assay-verify-ts bundle."
            exit 1
          fi
          echo "OK: no inline verifyPack in verify.html"
