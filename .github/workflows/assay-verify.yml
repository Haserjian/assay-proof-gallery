# Assay Verify — generated by: assay trust bootstrap --profile reviewer
#
# Trust posture: advisory
# Action pinned to immutable commit SHA for supply-chain safety.

name: Assay Verify

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  assay-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trust posture annotation
        run: echo "::warning::Trust bootstrap active (advisory). Unregistered signers will produce warnings. Register in trust/signers.yaml."

      - name: Verify Proof Packs
        uses: Haserjian/assay-verify-action@40af9bd1a9587d11f65e16639e6d1a6231ef4808
        with:
          pack-path: "gallery/01-fintech-pass/proof_pack/"
          require-pack: true
          require-claim-pass: true
          comment-on-pr: true
          trust-target: ci_gate
          trust-policy-dir: trust/
          assay-version: "1.19.0"
